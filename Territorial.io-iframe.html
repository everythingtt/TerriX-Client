<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; frame-src *; style-src * 'unsafe-inline'; img-src * data:; connect-src *;">
    <title>TerriX Iframe Manager</title>
    <style>
        :root {
            --bg: #08080c; --surf: #0f0f16; --surf2: #16161f; --brd: #252535;
            --txt: #e8e8f0; --dim: #7878a0; --accent: #3a47ff; --green: #00e676;
            --red: #ff5252; --sidebar-w: 280px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--txt); display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: var(--sidebar-w); background: var(--surf); border-right: 1px solid var(--brd); display: flex; flex-direction: column; }
        .header { padding: 15px; border-bottom: 1px solid var(--brd); font-weight: bold; font-size: 16px; color: var(--accent); display: flex; align-items: center; gap: 10px; }
        .logo { width: 24px; height: 24px; background: linear-gradient(135deg, var(--accent), #00e5ff); border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 12px; }
        
        .controls { padding: 15px; border-bottom: 1px solid var(--brd); }
        .input-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .input-group label { font-size: 11px; color: var(--dim); text-transform: uppercase; font-weight: bold; }
        .url-row { display: flex; gap: 5px; }
        input[type="text"] { flex: 1; padding: 8px; background: #000; border: 1px solid var(--brd); color: var(--txt); border-radius: 4px; font-size: 12px; outline: none; }
        input[type="text"]:focus { border-color: var(--accent); }
        button { padding: 8px 12px; background: var(--accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        button:hover { background: #4d5cff; }
        
        .options { display: flex; flex-direction: column; gap: 8px; font-size: 12px; color: var(--dim); }
        .options label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .options input[type="checkbox"] { accent-color: var(--accent); }
        
        .tab-list { flex: 1; overflow-y: auto; padding: 10px; }
        .tab-item { display: flex; align-items: center; justify-content: space-between; padding: 10px; background: var(--surf2); margin-bottom: 5px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .tab-item:hover { background: #1c1c28; }
        .tab-item.active { border-color: var(--accent); background: rgba(58, 71, 255, 0.1); }
        .tab-title { font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 150px; display: flex; align-items: center; gap: 8px; }
        .device-badge { background: var(--surf); border: 1px solid var(--brd); padding: 2px 6px; border-radius: 10px; font-size: 9px; color: #b388ff; }
        .tab-close { color: var(--dim); background: none; padding: 2px 5px; font-size: 16px; border: none; transition: 0.2s; }
        .tab-close:hover { color: var(--red); }
        
        .main { flex: 1; display: flex; flex-direction: column; }
        .topbar { display: flex; background: var(--surf); border-bottom: 1px solid var(--brd); padding: 8px 10px 0; gap: 5px; overflow-x: auto; }
        .topbar::-webkit-scrollbar { height: 4px; }
        .topbar::-webkit-scrollbar-thumb { background: var(--brd); border-radius: 4px; }
        
        .top-tab { padding: 8px 15px; background: var(--surf2); border-radius: 6px 6px 0 0; font-size: 12px; cursor: pointer; border: 1px solid var(--brd); border-bottom: none; display: flex; align-items: center; gap: 8px; color: var(--dim); }
        .top-tab:hover { color: var(--txt); }
        .top-tab.active { background: var(--bg); color: var(--txt); border-top: 2px solid var(--accent); }
        .top-tab-close { margin-left: 5px; font-size: 14px; cursor: pointer; color: inherit; border: none; background: none; }
        .top-tab-close:hover { color: var(--red); }
        
        .iframes { flex: 1; position: relative; background: #000; }
        iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; display: none; background: #fff; }
        iframe.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header">
            <div class="logo">TX</div>
            Iframe Manager
        </div>
        <div class="controls">
            <div class="input-group">
                <label>Target URL</label>
                <div class="url-row">
                    <input type="text" id="urlInput" value="https://everythingtt.github.io/TerriX-Client/Territorial.io.html">
                    <button id="addBtn">Spawn</button>
                </div>
            </div>
            <div class="options">
                <label><input type="checkbox" id="optProtocol" checked> Auto Protocol Upgrading</label>
                <label><input type="checkbox" id="optBypass" checked> Bypass X-Frame-Options</label>
                <label><input type="checkbox" id="optDevice" checked> Spoof Device Fingerprint</label>
            </div>
        </div>
        <div class="tab-list" id="tabList"></div>
    </div>

    <div class="main">
        <div class="topbar" id="topBar"></div>
        <div class="iframes" id="iframeContainer"></div>
    </div>

    <script>
        const urlInput = document.getElementById('urlInput');
        const addBtn = document.getElementById('addBtn');
        const optProtocol = document.getElementById('optProtocol');
        const optBypass = document.getElementById('optBypass');
        const optDevice = document.getElementById('optDevice');
        
        const tabList = document.getElementById('tabList');
        const topBar = document.getElementById('topBar');
        const iframeContainer = document.getElementById('iframeContainer');
        
        let tabs = [];
        let activeTabId = null;
        let tabCounter = 0;

        function generateDeviceId() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function sanitizeUrl(url) {
            let finalUrl = url.trim();
            if (optProtocol.checked) {
                // Auto Protocol Upgrading: Force https://
                if (!finalUrl.startsWith('http://') && !finalUrl.startsWith('https://')) {
                    finalUrl = 'https://' + finalUrl;
                } else if (finalUrl.startsWith('http://')) {
                    finalUrl = finalUrl.replace('http://', 'https://');
                }
            }
            return finalUrl;
        }

        function buildProxyUrl(url, deviceId) {
            let targetUrl = url;
            
            // Make the game think each iframe is another device by appending unique device query param
            if (optDevice.checked) {
                const separator = targetUrl.includes('?') ? '&' : '?';
                targetUrl += separator + 'device_id=' + deviceId;
            }

            if (optBypass.checked) {
                // Wrap in Google search query to bypass X-Frame-Options: SAMEORIGIN
                // Prepend google.com/search?igu=1
                return 'https://www.google.com/search?igu=1&q=' + encodeURIComponent(targetUrl);
            }
            
            return targetUrl;
        }

        function createTab(rawUrl) {
            tabCounter++;
            const id = 'tab_' + tabCounter;
            const deviceId = generateDeviceId();
            
            // Sanitization
            const sanitizedUrl = sanitizeUrl(rawUrl);
            
            // Final assigned src
            const finalUrl = buildProxyUrl(sanitizedUrl, deviceId);
            
            const title = `Instance ${tabCounter}`;
            
            const tabObj = { id, title, finalUrl, deviceId };
            tabs.push(tabObj);
            
            // Create sidebar item
            const sbItem = document.createElement('div');
            sbItem.className = 'tab-item';
            sbItem.id = `sb_${id}`;
            sbItem.innerHTML = `
                <div class="tab-title">
                    ${title}
                    <span class="device-badge">${deviceId}</span>
                </div>
                <button class="tab-close" onclick="closeTab('${id}', event)">×</button>
            `;
            sbItem.onclick = () => activateTab(id);
            tabList.appendChild(sbItem);
            
            // Create top bar item
            const topItem = document.createElement('div');
            topItem.className = 'top-tab';
            topItem.id = `top_${id}`;
            topItem.innerHTML = `
                ${title}
                <button class="top-tab-close" onclick="closeTab('${id}', event)">×</button>
            `;
            topItem.onclick = () => activateTab(id);
            topBar.appendChild(topItem);
            
            // Create iframe
            const iframe = document.createElement('iframe');
            iframe.id = `frame_${id}`;
            iframe.src = finalUrl;
            
            iframeContainer.appendChild(iframe);
            
            activateTab(id);
        }

        function activateTab(id) {
            activeTabId = id;
            
            // Update UI active states
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.top-tab').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('iframe').forEach(el => el.classList.remove('active'));
            
            if (id) {
                const sb = document.getElementById(`sb_${id}`);
                const top = document.getElementById(`top_${id}`);
                const frame = document.getElementById(`frame_${id}`);
                
                if (sb) sb.classList.add('active');
                if (top) top.classList.add('active');
                if (frame) frame.classList.add('active');
            }
        }

        window.closeTab = function(id, event) {
            if (event) event.stopPropagation();
            
            tabs = tabs.filter(t => t.id !== id);
            
            const sb = document.getElementById(`sb_${id}`);
            const top = document.getElementById(`top_${id}`);
            const frame = document.getElementById(`frame_${id}`);
            
            if (sb) sb.remove();
            if (top) top.remove();
            if (frame) frame.remove();
            
            if (activeTabId === id) {
                if (tabs.length > 0) {
                    activateTab(tabs[tabs.length - 1].id);
                } else {
                    activateTab(null);
                }
            }
        }

        addBtn.addEventListener('click', () => {
            if (urlInput.value.trim()) {
                createTab(urlInput.value);
            }
        });

        urlInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && urlInput.value.trim()) {
                createTab(urlInput.value);
            }
        });

        // Spawn first tab automatically
        createTab(urlInput.value);
    </script>
</body>
</html>
